name: 🤖 竞品监控
on:
  schedule:
    # 每周一和周四早上 8 点（UTC+8 = 0:00 UTC）
    - cron: '0 0 * * 1,4'
  workflow_dispatch:  # 也可以手动触发

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 检查竞品更新
        run: node scripts/check-updates.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 提交监控报告
        run: |
          git config user.name "zirflow-bot"
          git config user.email "bot@zirflow.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore(monitor): 竞品监控更新 $(date +'%Y-%m-%d')"
          git push
